# 学术文献API
academic_sources:
  semantic_scholar:
    api_key: ""  # 可选，有Key可提高速率
    base_url: "https://api.semanticscholar.org/graph/v1"
    keywords:
      - "water ecology restoration"
      - "aquatic ecosystem management"
      - "water quality monitoring"
      - "river restoration"
      - "lake eutrophication"
      - "wastewater treatment"
      - "constructed wetland"
      - "ecological flow"
      - "nonpoint source pollution"
      - "drinking water safety"
    fields: "title,year,abstract,citationCount,openAccessPdf,authors,venue,externalIds"
    min_citations: 5
    max_results: 50
    
  openalex:
    base_url: "https://api.openalex.org/works"
    keywords:
      - "水生态环境"
      - "水环境治理"
      - "水生态修复"
      - "水质监测"
      - "黑臭水体治理"
      - "流域生态"
      - "污水处理"
      - "人工湿地"
      - "面源污染"
      - "饮用水安全"
    min_cited_by_count: 3
    max_results: 50

